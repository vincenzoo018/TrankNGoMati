<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In — TrackNGo Mati</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --mati-blue-deep:#0B2E63;
    --mati-blue:#0F3D8C;
    --mati-blue-bright:#1857C4;
    --gov-gold:#F0B429;
    --gov-gold-soft:#F6CD6B;
    --coconut-green:#1E7145;
    --paper:#FBF9F4;
    --ink:#12233F;
    --ink-soft:#5B6B85;
    --line:#E4E1D8;
    --danger:#C8383A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Public Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .screen{
    width:100%;
    min-height:100vh;
    display:grid;
    grid-template-columns:1.05fr 1fr;
  }
  @media (max-width:880px){
    .screen{grid-template-columns:1fr;}
    .side{min-height:280px;}
  }

  /* ---------- LEFT: Identity panel ---------- */
  .side{
    position:relative;
    background:
      radial-gradient(120% 90% at 15% 10%, var(--mati-blue-bright) 0%, var(--mati-blue) 38%, var(--mati-blue-deep) 100%);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:48px 52px;
    color:#fff;
  }

  /* radiating sun rays, echoing the seal's gold star ring */
  .rays{
    position:absolute;
    top:-30%;
    left:-20%;
    width:150%;
    height:150%;
    background:
      repeating-conic-gradient(from 0deg at 30% 32%,
        rgba(240,180,41,0.10) 0deg 4deg,
        transparent 4deg 16deg);
    opacity:0.55;
    pointer-events:none;
  }

  /* Dahican wave motif — Mati's signature as the surfing capital of Mindanao */
  .waves{
    position:absolute;
    left:0; right:0; bottom:0;
    height:190px;
    pointer-events:none;
  }
  .waves svg{position:absolute; bottom:0; width:100%; height:100%;}

  .side-top{position:relative; z-index:2;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gov-gold-soft);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:34px;
  }
  .eyebrow::before{
    content:"";
    width:22px; height:1px;
    background:var(--gov-gold-soft);
  }

  .seal-wrap{
    position:relative;
    width:200px; height:200px;
    margin-bottom:26px;
    filter:drop-shadow(0 10px 24px rgba(0,0,0,0.35));
  }
  .seal-wrap::before{
    content:"";
    position:absolute;
    inset:-14px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(240,180,41,0.35) 0%, rgba(240,180,41,0) 70%);
  }
  .seal-wrap img{
    position:relative;
    width:100%; height:100%;
    display:block;
  }

  h1.brand{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:40px;
    line-height:1.08;
    letter-spacing:-0.01em;
    margin-bottom:14px;
  }
  h1.brand span{color:var(--gov-gold-soft);}

  .tagline{
    font-size:15.5px;
    line-height:1.6;
    color:rgba(255,255,255,0.82);
    max-width:380px;
    margin-bottom:30px;
  }

  .feature-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:13px;
    position:relative;
    z-index:2;
  }
  .feature-list li{
    display:flex;
    align-items:flex-start;
    gap:11px;
    font-size:13.5px;
    line-height:1.5;
    color:rgba(255,255,255,0.86);
  }
  .feature-list li svg{
    flex-shrink:0;
    margin-top:2px;
    color:var(--gov-gold-soft);
  }

  .side-bottom{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:12.5px;
    color:rgba(255,255,255,0.72);
  }
  .side-bottom .office b{display:block; color:#fff; font-size:13.5px; margin-bottom:2px;}
  .secure-badge{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12px;
    color:rgba(255,255,255,0.85);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    padding:8px 13px;
    border-radius:999px;
  }
  .secure-badge svg{color:var(--gov-gold-soft); flex-shrink:0;}

  /* ---------- RIGHT: Form panel ---------- */
  .form-side{
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 40px;
  }
  .form-inner{width:100%; max-width:400px;}

  .form-head{margin-bottom:30px;}
  .form-head .kicker{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--coconut-green);
    margin-bottom:10px;
  }
  .form-head h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
    color:var(--ink);
    margin-bottom:6px;
  }
  .form-head p{color:var(--ink-soft); font-size:14px;}

  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:7px;
  }
  label .req{color:var(--danger);}

  .field{margin-bottom:18px;}
  .input-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }
  .input-wrap svg{
    position:absolute;
    left:14px;
    width:16px; height:16px;
    color:var(--ink-soft);
    pointer-events:none;
  }
  input[type=text], input[type=password], input[type=email]{
    width:100%;
    padding:12px 14px 12px 40px;
    border:1.5px solid var(--line);
    border-radius:8px;
    font-size:14.5px;
    font-family:'Public Sans', sans-serif;
    color:var(--ink);
    background:#FCFBF8;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input::placeholder{color:#9AA5B8;}
  input:focus{
    outline:none;
    border-color:var(--mati-blue-bright);
    box-shadow:0 0 0 3px rgba(24,87,196,0.14);
    background:#fff;
  }
  .toggle-eye{
    position:absolute;
    right:12px;
    background:none;
    border:none;
    cursor:pointer;
    color:var(--ink-soft);
    padding:4px;
    display:flex;
  }
  .toggle-eye:focus-visible{outline:2px solid var(--mati-blue-bright); border-radius:4px;}

  .row-between{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:24px;
    font-size:13.5px;
  }
  .remember{display:flex; align-items:center; gap:8px; color:var(--ink-soft);}
  .remember input{width:15px; height:15px; accent-color:var(--mati-blue-bright);}
  .forgot{color:var(--mati-blue-bright); text-decoration:none; font-weight:600;}
  .forgot:hover{text-decoration:underline;}

  .btn-signin{
    width:100%;
    padding:13px;
    background:var(--mati-blue-bright);
    background-image:linear-gradient(180deg, var(--mati-blue-bright), var(--mati-blue));
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:700;
    font-family:'Public Sans', sans-serif;
    letter-spacing:0.01em;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 6px 16px rgba(15,61,140,0.28);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn-signin:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(15,61,140,0.35);}
  .btn-signin:focus-visible{outline:3px solid var(--gov-gold); outline-offset:2px;}

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:28px 0 18px;
    color:#B7BFCC;
    font-size:11.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .divider::before, .divider::after{content:""; flex:1; height:1px; background:var(--line);}

  .demo-label{font-size:12.5px; color:var(--ink-soft); margin-bottom:10px;}
  .demo-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin-bottom:16px;
  }
  .demo-chip{
    padding:9px 6px;
    border:1.3px solid var(--line);
    border-radius:7px;
    background:#FCFBF8;
    font-size:12.5px;
    font-weight:600;
    color:var(--mati-blue);
    text-align:center;
    cursor:pointer;
    transition:all .12s ease;
  }
  .demo-chip:hover{border-color:var(--mati-blue-bright); background:#EFF4FE; color:var(--mati-blue-bright);}

  .footnote{
    text-align:center;
    font-size:11.5px;
    color:#9AA5B8;
    line-height:1.7;
  }
  .footnote b{color:var(--ink-soft);}
</style>
</head>
